# Postgres + приложение (Next.js + Kimi CLI агент).
# Dev: поднять только db (docker compose up db). Прод: docker compose up -d.
services:
  db:
    image: postgres:16
    container_name: gstation-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gstation
      POSTGRES_PASSWORD: gstation
      POSTGRES_DB: gstation
    ports:
      - "5433:5432"
    volumes:
      - gstation-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gstation -d gstation"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    container_name: gstation-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # БД внутри сети compose — хост `db`, порт 5432.
      GSTATION_DATABASE_URL: postgresql://gstation:gstation@db:5432/gstation
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3007}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?задайте NEXTAUTH_SECRET}
      # Ключ Kimi: переопределяется значением из Настроек (БД) в рантайме.
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      # Рабочая директория агента (скилы + KNOWLEDGE) — смонтирована ниже.
      KIMI_AGENT_WORKSPACE: /workspace
      KIMI_BIN: /root/.local/bin/kimi
    ports:
      - "3007:3007"
    volumes:
      # Скилы и база знаний доступны агенту (read-only).
      # Подставьте путь к репозиторию gidrostroy на хосте.
      - ${KIMI_WORKSPACE_HOST:-../gidrostroy}:/workspace:ro

volumes:
  gstation-db-data:
