# Postgres + приложение (Next.js + Kimi CLI агент).
# Dev: поднять только db (docker compose up db). Прод: docker compose up -d.
services:
  db:
    image: postgres:16
    container_name: gstation-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gstation
      POSTGRES_PASSWORD: gstation
      POSTGRES_DB: gstation
    ports:
      - "5433:5432"
    volumes:
      - gstation-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gstation -d gstation"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    container_name: gstation-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # БД внутри сети compose — хост `db`, порт 5432.
      GSTATION_DATABASE_URL: postgresql://gstation:gstation@db:5432/gstation
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3007}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?задайте NEXTAUTH_SECRET}
      # next-auth v5 за прокси/в Docker — иначе UntrustedHost.
      AUTH_TRUST_HOST: "true"
      # Ключ Kimi: переопределяется значением из Настроек (БД) в рантайме.
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      # Рабочая директория агента (скилы + KNOWLEDGE) — смонтирована ниже.
      KIMI_AGENT_WORKSPACE: /workspace
      KIMI_BIN: /root/.local/bin/kimi
    ports:
      - "3007:3007"
    volumes:
      # Методика (скилы + KNOWLEDGE) НЕ запекается в образ — живёт на
      # ЗАПИСЫВАЕМОМ volume, чтобы правки из раздела «Методика» сохранялись и
      # переживали рестарт контейнера.
      - gstation-workspace:/workspace
      # Источник для ПЕРВОГО засева (read-only): репозиторий с методикой.
      # entrypoint копирует его в volume, только если volume пуст.
      - ${KIMI_WORKSPACE_HOST:-../gidrostroy}:/seed:ro
      # OAuth-креды kimi (kimi login → credentials/kimi-code.json). Каталог
      # ЗАПИСЫВАЕМЫЙ — CLI обновляет access_token по refresh_token и пишет туда.
      # Провайдер managed:kimi-code читает их (см. oauth-блок в kimi-agent.ts).
      # На хосте: /opt/kimi-home/.kimi (т.е. ../kimi-home/.kimi от compose-файла).
      - ${KIMI_HOME_HOST:-../kimi-home/.kimi}:/root/.kimi

volumes:
  gstation-db-data:
  gstation-workspace:
